<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Booking</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f4f7fc;
        }
        .container {
            max-width: 600px;
            margin-top: 50px;
        }
        .form-label {
            font-weight: bold;
        }
        #payment-status-container {
            margin-top: 20px;
            text-align: center;
            display: none; /* Initially hidden */
        }
    </style>
</head>
<body>
    <div class="container mt-5">
        <h1 class="text-center mb-4">User Booking Form</h1>

        <form id="booking-form">
            <div class="mb-3">
                <label for="username" class="form-label">Username:</label>
                <input type="text" id="username" class="form-control" required>
            </div>
            <div class="mb-3">
                <label for="booking-date" class="form-label">Booking Date:</label>
                <input type="date" id="booking-date" class="form-control" required>
            </div>
            <div class="mb-3">
                <label for="tickets" class="form-label">Number of Tickets:</label>
                <input type="number" id="tickets" class="form-control" required min="1" oninput="updatePrice()">
            </div>
            <!-- Display Total Price -->
            <div class="mb-3">
                <label for="total-price" class="form-label">Total Price:</label>
                <input type="text" id="total-price" class="form-control" disabled>
            </div>
            <button type="submit" class="btn btn-primary w-100">Submit Booking</button>
        </form>
        
        <div class="mt-3">
            <a href="index.html">Go back to Home</a>
        </div>

        <!-- Booking Confirmation and Payment Info -->
        <div id="payment-status-container">
            <h4 class="text-center">Booking Confirmed!</h4>
            <h5 class="text-center">Price: <span id="final-price"></span> INR</h5>
            <p class="text-center">Please pay at the venue.</p>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS -->
    <script src="user-booking.js"></script>
</body>
</html>
